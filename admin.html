<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>管理メニュー | 大子連合将棋愛好会</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Noto Sans JP', sans-serif;
      background: #f5f1e8;
      color: #2c2c2c;
    }
    .admin-container {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 {
      color: #2f5d41;
      font-size: 1.5rem;
      border-bottom: 2px solid #2f5d41;
      padding-bottom: 8px;
    }
    h2 {
      color: #2f5d41;
      font-size: 1.2rem;
      margin-top: 32px;
    }
    .setup-section {
      background: #fff;
      border: 1px solid #dfd4c2;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .setup-section label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .setup-section input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dfd4c2;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .notice-item {
      background: #fff;
      border: 1px solid #dfd4c2;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .notice-item input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #dfd4c2;
      border-radius: 8px;
      font-size: 16px;
    }
    .date-picker {
      width: 160px;
      flex: 0 0 160px;
      padding: 10px 12px;
      border: 1px solid #dfd4c2;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
    }
    .date-display {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 700;
      color: #cc2200;
      min-width: 0;
    }
    .btn {
      min-height: 48px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: #2f5d41; color: #fff; }
    .btn-primary:hover { background: #244a33; }
    .btn-danger { background: #cc2200; color: #fff; }
    .btn-danger:hover { background: #a01b00; }
    .btn-secondary { background: #fff; color: #2f5d41; border: 1px solid #2f5d41; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 700;
      display: none;
    }
    .status.success { display: block; background: #edf7ed; color: #2f5d41; }
    .status.error { display: block; background: #fdecea; color: #cc2200; }
    .status.loading { display: block; background: #fff8e1; color: #8b6914; }
    .preview {
      background: #fffef5;
      border: 1px solid #ddd2b8;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      text-align: center;
    }
    .preview li {
      color: #cc2200;
      font-size: 1.2rem;
      font-weight: 700;
      list-style: none;
    }
    .preview ul { padding: 0; margin: 8px 0; }
    .footer-note-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dfd4c2;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 8px;
    }
    @media (max-width: 480px) {
      .date-picker {
        width: 100%;
        flex: 1 1 100%;
      }
      .date-display {
        flex: 1 1 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <h1>大子連合将棋愛好会 管理メニュー</h1>

    <h2>GitHub設定</h2>
    <div class="setup-section">
      <label>Personal Access Token</label>
      <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <p style="font-size:0.82rem; color:#666;">
        トークンは保存されません（ブラウザのメモリにのみ保持）。<br>
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=daigo-shogi-admin" target="_blank" rel="noopener">
          トークンを発行する →
        </a>（repo権限にチェック）
      </p>
    </div>

    <h2>お休みのお知らせ管理</h2>

    <div id="notices-list"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="addNotice()">＋ 日程を追加</button>
    </div>

    <label style="display:block; margin-top:20px; font-weight:700; font-size:0.9rem;">補足メッセージ</label>
    <input type="text" class="footer-note-input" id="footer-note" value="その他の日・木曜日は予定通り行います">

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveSchedule()">保存してサイトに反映</button>
      <button class="btn btn-secondary" onclick="loadSchedule()">現在のデータを読み込み</button>
    </div>

    <div id="status" class="status"></div>

    <h2>プレビュー</h2>
    <div class="preview" id="preview">
      <p><strong>いきいきサロン将棋くらぶ<br>お休みのお知らせ</strong></p>
      <ul id="preview-list"></ul>
      <p id="preview-footer" style="color:#666; font-size:0.9rem;"></p>
    </div>

    <p style="margin-top:40px; font-size:0.82rem; color:#999; text-align:center;">
      <a href="index.html">← サイトトップに戻る</a>
    </p>
  </div>

  <script>
    const REPO_OWNER = 'daigo-shogi';
    const REPO_NAME = 'daigo-shogi';
    const FILE_PATH = 'data/schedule.json';
    const BRANCH = 'main';
    const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];

    let notices = [];
    let currentSha = null;

    window.addEventListener('DOMContentLoaded', loadSchedule);

    function getToken() {
      return document.getElementById('github-token').value.trim();
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    async function loadSchedule() {
      setStatus('読み込み中...', 'loading');
      try {
        const localRes = await fetch('data/schedule.json?' + Date.now());
        if (localRes.ok) {
          const data = await localRes.json();
          notices = (data.notices || []).map(function(n) {
            return {
              date: n.date || '',
              note: n.note || 'お休みです',
              iso: n.iso || ''
            };
          });
          document.getElementById('footer-note').value = data.footer_note || '';
          renderNotices();
          updatePreview();
          setStatus('データを読み込みました。', 'success');
        }

        const token = getToken();
        if (token) {
          const ghRes = await fetch(
            'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + FILE_PATH + '?ref=' + BRANCH,
            { headers: { 'Authorization': 'Bearer ' + token } }
          );
          if (ghRes.ok) {
            const ghData = await ghRes.json();
            currentSha = ghData.sha;
          }
        }
      } catch (e) {
        setStatus('読み込みエラー: ' + e.message, 'error');
      }
    }

    function formatDateJP(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const weekday = WEEKDAYS[d.getDay()];
      return month + '月' + day + '日（' + weekday + '）';
    }

    function renderNotices() {
      const container = document.getElementById('notices-list');
      container.innerHTML = notices.map(function(n, i) {
        const isoVal = n.iso || '';
        return '<div class="notice-item">' +
          '<input type="date" class="date-picker" value="' + isoVal + '" onchange="updateNoticeFromDate(' + i + ',this.value)">' +
          '<span class="date-display">' + (n.date || '日付を選択') + '</span>' +
          '<button class="btn btn-danger" onclick="removeNotice(' + i + ')">削除</button>' +
          '</div>';
      }).join('');
    }

    function addNotice() {
      notices.push({ date: '', note: 'お休みです', iso: '' });
      renderNotices();
      updatePreview();
      const pickers = document.querySelectorAll('.date-picker');
      if (pickers.length > 0) {
        const picker = pickers[pickers.length - 1];
        picker.focus();
        if (typeof picker.showPicker === 'function') {
          picker.showPicker();
        }
      }
    }

    function removeNotice(i) {
      notices.splice(i, 1);
      renderNotices();
      updatePreview();
    }

    function updateNoticeFromDate(index, isoDate) {
      if (!isoDate) return;
      const formatted = formatDateJP(isoDate);
      notices[index].date = formatted;
      notices[index].iso = isoDate;
      renderNotices();
      updatePreview();
    }

    function updatePreview() {
      const list = document.getElementById('preview-list');
      const footer = document.getElementById('preview-footer');
      if (notices.length === 0) {
        list.innerHTML = '<li style="color:#2f5d41">現在、お休みの予定はありません。</li>';
      } else {
        list.innerHTML = notices
          .filter(function(n) { return n.date; })
          .map(function(n) { return '<li>' + n.date + '　' + (n.note || 'お休みです') + '</li>'; })
          .join('');
      }
      footer.textContent = document.getElementById('footer-note').value;
    }

    async function saveSchedule() {
      const token = getToken();
      if (!token) {
        setStatus('GitHub Tokenを入力してください。', 'error');
        return;
      }

      setStatus('保存中...', 'loading');

      const scheduleData = {
        notices: notices.filter(function(n) { return n.date; }).map(function(n) {
          return { date: n.date, note: n.note || 'お休みです', iso: n.iso || '' };
        }),
        footer_note: document.getElementById('footer-note').value,
        last_updated: new Date().toISOString().slice(0, 10)
      };

      const content = btoa(unescape(encodeURIComponent(JSON.stringify(scheduleData, null, 2))));

      try {
        if (!currentSha) {
          const shaRes = await fetch(
            'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + FILE_PATH + '?ref=' + BRANCH,
            { headers: { 'Authorization': 'Bearer ' + token } }
          );
          if (shaRes.ok) {
            const shaData = await shaRes.json();
            currentSha = shaData.sha;
          }
        }

        const body = {
          message: 'お休み日程を更新 (' + new Date().toLocaleDateString('ja-JP') + ')',
          content: content,
          branch: BRANCH
        };
        if (currentSha) {
          body.sha = currentSha;
        }

        const res = await fetch(
          'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + FILE_PATH,
          {
            method: 'PUT',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          }
        );

        if (res.ok) {
          const result = await res.json();
          currentSha = result.content.sha;
          setStatus('保存完了！30秒ほどでサイトに反映されます。', 'success');
        } else {
          const err = await res.json();
          setStatus('保存エラー: ' + (err.message || res.status), 'error');
        }
      } catch (e) {
        setStatus('通信エラー: ' + e.message, 'error');
      }
    }

    window.addNotice = addNotice;
    window.removeNotice = removeNotice;
    window.updateNoticeFromDate = updateNoticeFromDate;
    window.saveSchedule = saveSchedule;
    window.loadSchedule = loadSchedule;

    document.getElementById('footer-note').addEventListener('input', updatePreview);
  </script>
</body>
</html>
